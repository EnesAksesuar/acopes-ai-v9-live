<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <title>TagFlow Ayarlar</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f9fafb;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:40px 20px;color:#111827}
    .wrap{width:100%;max-width:460px}
    .page-hdr{display:flex;align-items:center;gap:10px;margin-bottom:24px}
    .page-ico{width:42px;height:42px;background:#0F6E56;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
    .page-name{font-size:18px;font-weight:700}
    .page-sub{font-size:12px;color:#9ca3af}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.04)}
    .card-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#9ca3af;margin-bottom:14px}
    label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}
    input[type=email],input[type=password]{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font:13px/1 inherit;color:#111827;background:#fafafa;margin-bottom:10px;transition:border-color .15s}
    input:focus{outline:none;border-color:#1D9E75;background:#fff}
    .btn-p{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:9px;font:600 13px inherit;cursor:pointer;margin-top:4px;transition:background .15s}
    .btn-p:hover:not(:disabled){background:#0F6E56}
    .btn-p:disabled{background:#9ca3af;cursor:not-allowed}
    .btn-d{width:100%;padding:9px;background:transparent;color:#9ca3af;border:1px solid #e5e7eb;border-radius:9px;font:12px inherit;cursor:pointer;margin-top:8px;transition:all .15s}
    .btn-d:hover{color:#B91C1C;border-color:#FECACA;background:#FEF2F2}
    .link-btn{background:none;border:none;color:#1D9E75;font:12px inherit;cursor:pointer;text-decoration:underline;margin-top:10px;display:block;text-align:center}
    .toast{display:none;margin-top:10px;padding:10px 12px;border-radius:8px;font:500 12px/1.5 inherit}
    .toast.ok{background:#E1F5EE;border:1px solid #5DCAA5;color:#0F6E56}
    .toast.err{background:#FEF2F2;border:1px solid #FECACA;color:#B91C1C}
    /* ── Logged-in card ── */
    .user-row{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .user-avatar{width:36px;height:36px;background:#E1F5EE;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
    .user-email{font-size:13px;font-weight:600;color:#111827}
    .plan-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:2px}
    .plan-badge.free{background:#f3f4f6;color:#6b7280}
    .plan-badge.premium{background:#fef9c3;color:#854d0e}
    .plan-badge.power{background:#ede9fe;color:#5b21b6}
    .credit-wrap{margin-bottom:14px}
    .credit-label{font-size:11px;color:#6b7280;margin-bottom:5px}
    .credit-bar-bg{height:6px;background:#f3f4f6;border-radius:4px;overflow:hidden;margin-bottom:4px}
    .credit-bar-fill{height:100%;border-radius:4px;background:#1D9E75;transition:width .4s ease}
    .credit-nums{font-size:12px;color:#374151;font-weight:600}
    .credit-nums .used{color:#0F6E56}
    .upgrade-cta{background:#fef9c3;border:1px solid #fde047;border-radius:8px;padding:10px 12px;font-size:12px;color:#854d0e;display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
    .upgrade-cta a{color:#854d0e;font-weight:700}
    /* ── Steps ── */
    .steps{display:flex;gap:8px}
    .step{flex:1;padding:10px;background:#f9fafb;border:1px solid #f3f4f6;border-radius:8px;text-align:center}
    .step-n{font-size:18px;font-weight:700;color:#0F6E56}
    .step-l{font-size:10px;color:#9ca3af;margin-top:2px;line-height:1.4}
  </style>
</head>
<body>
<div class="wrap">
  <div class="page-hdr">
    <div class="page-ico">🏷️</div>
    <div>
      <div class="page-name">ACOPES AI · TagFlow</div>
      <div class="page-sub">Ayarlar</div>
    </div>
  </div>

  <!-- ── Auth card (state managed by tagflow_opts.js) ── -->
  <div class="card" id="authCard">
    <div class="card-title" id="cardTitle">Giriş Yap</div>

    <!-- Logged-OUT view -->
    <div id="loginView">
      <label>Email</label>
      <input type="email"    id="emailInput"    placeholder="ornek@email.com" autocomplete="email"/>
      <label>Şifre</label>
      <input type="password" id="passwordInput" placeholder="En az 8 karakter" autocomplete="current-password"/>
      <button class="btn-p" id="loginBtn">Giriş Yap</button>
      <button class="link-btn" id="switchMode">Hesabın yok mu? Ücretsiz kayıt ol →</button>
    </div>

    <!-- Logged-IN view (hidden initially) -->
    <div id="loggedInView" style="display:none">
      <div class="user-row">
        <div class="user-avatar">👤</div>
        <div>
          <div class="user-email" id="userEmail"></div>
          <span class="plan-badge" id="planBadge">FREE</span>
        </div>
      </div>
      <div class="credit-wrap" id="creditWrap">
        <div class="credit-label">Günlük Analiz Kullanımı</div>
        <div class="credit-bar-bg"><div class="credit-bar-fill" id="creditBar" style="width:0%"></div></div>
        <div class="credit-nums"><span class="used" id="usedNum">0</span> / <span id="limitNum">15</span> analiz kullanıldı</div>
      </div>
      <div class="upgrade-cta" id="upgradeCta" style="display:none">
        ⚡ Limitiniz dolmak üzere.
        <a href="https://tagflow.acopesai.com/upgrade" target="_blank">Premium'a geç →</a>
      </div>
      <button class="btn-d" id="logoutBtn">Çıkış Yap</button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <!-- ── How to use ── -->
  <div class="card">
    <div class="card-title">Nasıl Kullanılır?</div>
    <div class="steps">
      <div class="step"><div class="step-n">1</div><div class="step-l">Etsy'de arama yapın</div></div>
      <div class="step"><div class="step-n">2</div><div class="step-l">Ürün üzerine gelin</div></div>
      <div class="step"><div class="step-n">3</div><div class="step-l">TagFlow Analiz'e tıklayın</div></div>
      <div class="step"><div class="step-n">4</div><div class="step-l">Tag skorlarını görün</div></div>
    </div>
  </div>
</div>
<script src="tagflow_opts.js"></script>
</body>
</html>
