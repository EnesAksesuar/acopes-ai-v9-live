<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <title>TagFlow</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;width:280px;background:#fff;color:#111827}
    .hdr{background:#0F6E56;padding:13px 14px;display:flex;align-items:center;gap:9px}
    .hdr-ico{width:32px;height:32px;background:rgba(255,255,255,0.15);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
    .hdr-name{color:#fff;font-weight:700;font-size:14px}
    .hdr-sub{color:rgba(255,255,255,0.55);font-size:10px}
    .body{padding:16px}
    .status-card{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px;text-align:center;margin-bottom:14px}
    .status-ico{font-size:24px;margin-bottom:6px}
    .status-title{font-size:13px;font-weight:600;color:#166534;margin-bottom:4px}
    .status-sub{font-size:11px;color:#16a34a;line-height:1.5}
    .warn-card{background:#FEF3C7;border:1px solid #FCD34D;border-radius:10px;padding:12px;text-align:center;margin-bottom:14px}
    .warn-title{font-size:13px;font-weight:600;color:#92400E;margin-bottom:4px}
    .warn-sub{font-size:11px;color:#b45309;line-height:1.5}
    .btn{width:100%;padding:10px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font:600 12px inherit;cursor:pointer;transition:background .15s}
    .btn:hover{background:#0F6E56}
    .btn.sec{background:#f9fafb;color:#374151;border:1px solid #e5e7eb;margin-top:7px}
    .btn.sec:hover{border-color:#1D9E75;color:#0F6E56;background:#E1F5EE}
    .how-list{margin-bottom:14px}
    .how-item{display:flex;align-items:flex-start;gap:9px;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:11px;color:#374151;line-height:1.4}
    .how-item:last-child{border:none}
    .how-num{width:18px;height:18px;border-radius:50%;background:#E1F5EE;color:#0F6E56;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
    .footer{padding:8px 14px;border-top:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center}
    .footer-l{font-size:10px;color:#d1d5db}
    .footer-r{font-size:10px;color:#9ca3af;cursor:pointer}
    .footer-r:hover{color:#0F6E56}
  </style>
</head>
<body>
  <div class="hdr">
    <div class="hdr-ico">🏷️</div>
    <div><div class="hdr-name">ACOPES AI · TagFlow</div><div class="hdr-sub">Etsy Tag Rakabet Analizi</div></div>
  </div>
  <div class="body">
    <div id="statusArea"></div>
    <div class="how-list">
      <div class="how-item"><div class="how-num">1</div>Etsy'de herhangi bir ürün sayfasına veya arama sayfasına gidin</div>
      <div class="how-item"><div class="how-num">2</div>Herhangi bir ürün kartının üzerine gelin</div>
      <div class="how-item"><div class="how-num">3</div><strong>TagFlow Analiz</strong> butonuna tıklayın</div>
      <div class="how-item"><div class="how-num">4</div>Tag rakabet skorları ve fırsat tagları görüntülenir</div>
    </div>
    <button class="btn" id="goEtsy">Etsy'e Git →</button>
    <button class="btn sec" id="goSettings">⚙ Hesap &amp; Ayarlar</button>
  </div>
  <div class="footer">
    <span class="footer-l">v2.0</span>
    <span class="footer-r" id="fr">⚙ Ayarlar</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
