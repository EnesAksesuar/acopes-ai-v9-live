<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>TagFlow Admin Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f3f4f6;color:#111827;min-height:100vh}
    /* ── Auth ── */
    #loginWrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 4px 16px rgba(0,0,0,.06)}
    .login-card h1{font-size:20px;margin-bottom:6px}
    .login-card p{font-size:13px;color:#6b7280;margin-bottom:22px}
    .login-card input{width:100%;padding:10px 12px;border:1px solid #e5e7eb;border-radius:8px;font:13px inherit;margin-bottom:10px;background:#fafafa}
    .login-card input:focus{outline:none;border-color:#0F6E56;background:#fff}
    .btn-green{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:9px;font:600 14px inherit;cursor:pointer}
    .btn-green:hover{background:#0F6E56}
    .btn-green:disabled{background:#9ca3af;cursor:not-allowed}
    #loginErr{color:#b91c1c;font-size:12px;margin-top:8px;display:none}
    /* ── Dashboard ── */
    #dashWrap{display:none}
    .topbar{background:#111827;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
    .topbar h1{font-size:16px;font-weight:700}
    .topbar-right{display:flex;align-items:center;gap:12px;font-size:13px;color:#9ca3af}
    .btn-sm{padding:6px 14px;border-radius:7px;font:600 12px inherit;cursor:pointer;border:none}
    .btn-logout{background:#374151;color:#fff}
    .btn-logout:hover{background:#1f2937}
    /* ── Stats ── */
    .stats-bar{display:flex;gap:14px;padding:16px 24px;background:#fff;border-bottom:1px solid #e5e7eb;flex-wrap:wrap}
    .stat{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px 18px;min-width:110px}
    .stat-val{font-size:22px;font-weight:700;color:#111827}
    .stat-lbl{font-size:11px;color:#6b7280;margin-top:2px}
    /* ── Controls ── */
    .controls{display:flex;align-items:center;gap:10px;padding:14px 24px;background:#fff;border-bottom:1px solid #e5e7eb}
    .controls input{padding:8px 12px;border:1px solid #e5e7eb;border-radius:8px;font:13px inherit;width:260px}
    .controls input:focus{outline:none;border-color:#0F6E56}
    .btn-refresh{padding:8px 16px;background:#f3f4f6;border:1px solid #e5e7eb;border-radius:8px;font:600 12px inherit;cursor:pointer}
    .btn-refresh:hover{background:#e5e7eb}
    /* ── Table ── */
    .table-wrap{padding:20px 24px;overflow-x:auto}
    table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;font-size:13px}
    th{background:#f9fafb;padding:10px 12px;text-align:left;font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid #e5e7eb}
    td{padding:10px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fafafa}
    .badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
    .badge-free{background:#f3f4f6;color:#6b7280}
    .badge-premium{background:#fef9c3;color:#854d0e}
    .badge-power{background:#ede9fe;color:#5b21b6}
    .badge-owner{background:#fef2f2;color:#991b1b}
    .badge-admin{background:#fff7ed;color:#9a3412}
    .badge-user{background:#f0fdf4;color:#166534}
    .badge-active{background:#f0fdf4;color:#166534}
    .badge-disabled{background:#fef2f2;color:#991b1b}
    .actions{display:flex;gap:5px;flex-wrap:wrap}
    .act-btn{padding:4px 10px;border-radius:6px;font:600 11px inherit;cursor:pointer;border:none;white-space:nowrap;transition:filter .15s}
    .act-btn:hover{filter:brightness(.9)}
    .act-free{background:#f3f4f6;color:#374151}
    .act-prem{background:#fef9c3;color:#854d0e}
    .act-powr{background:#ede9fe;color:#5b21b6}
    .act-add{background:#dcfce7;color:#166534}
    .act-rst{background:#dbeafe;color:#1d4ed8}
    .act-dis{background:#fef2f2;color:#991b1b}
    .act-enb{background:#f0fdf4;color:#166534}
    .act-ovr{background:#fef3c7;color:#92400e}
    .inf{color:#6b7280;font-size:12px}
    .no-data{padding:40px;text-align:center;color:#9ca3af;font-size:14px}
    /* ── Toast ── */
    #toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:10px;font:600 13px inherit;display:none;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15)}
    #toast.ok{background:#1D9E75;color:#fff}
    #toast.err{background:#b91c1c;color:#fff}
    /* ── Modal ── */
    #modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);align-items:center;justify-content:center;z-index:100}
    #modal.open{display:flex}
    .modal-card{background:#fff;border-radius:12px;padding:28px;width:340px;box-shadow:0 8px 30px rgba(0,0,0,.15)}
    .modal-card h3{font-size:15px;margin-bottom:16px}
    .modal-card input{width:100%;padding:9px 12px;border:1px solid #e5e7eb;border-radius:8px;font:13px inherit;margin-bottom:12px}
    .modal-card input:focus{outline:none;border-color:#0F6E56}
    .modal-btns{display:flex;gap:8px}
    .modal-btns button{flex:1;padding:9px;border-radius:8px;font:600 13px inherit;cursor:pointer;border:none}
    .btn-confirm{background:#1D9E75;color:#fff}
    .btn-cancel-m{background:#f3f4f6;color:#374151}
  </style>
</head>
<body>

<!-- ── Login ── -->
<div id="loginWrap">
  <div class="login-card">
    <h1>TagFlow Admin</h1>
    <p>Owner / Admin access only. Role verified server-side on every request.</p>
    <input type="email"    id="loginEmail" placeholder="Admin email"  autocomplete="email"/>
    <input type="password" id="loginPwd"   placeholder="Password"     autocomplete="current-password"/>
    <button class="btn-green" id="loginBtn">Sign in</button>
    <div id="loginErr"></div>
  </div>
</div>

<!-- ── Dashboard ── -->
<div id="dashWrap">
  <div class="topbar">
    <h1>TagFlow Admin Dashboard</h1>
    <div class="topbar-right">
      <span id="adminEmail"></span>
      <button class="btn-sm btn-logout" id="logoutBtn">Sign out</button>
    </div>
  </div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search by email…" oninput="renderTable()"/>
    <button class="btn-refresh" onclick="loadUsers()">Refresh</button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Email</th><th>Plan</th><th>Role</th>
          <th>Used Today</th><th>Eff. Limit</th><th>Override</th>
          <th>Status</th><th>Joined</th><th>Actions</th>
        </tr>
      </thead>
      <tbody id="usersBody"></tbody>
    </table>
  </div>
</div>

<!-- ── Override modal ── -->
<div id="modal">
  <div class="modal-card">
    <h3 id="modalTitle">Set Daily Limit Override</h3>
    <input type="number" id="modalInput" placeholder="Enter value (blank = clear override)" min="0"/>
    <div class="modal-btns">
      <button class="btn-confirm"   id="modalConfirm">Confirm</button>
      <button class="btn-cancel-m"  onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
'use strict';

const API    = 'https://acopes-ai-production.up.railway.app';
let TOKEN    = '';
let allUsers = [];
let modalCb  = null;

// ── Bootstrap ────────────────────────────────────────────────────────────────
(function init() {
  TOKEN = localStorage.getItem('tfAdminToken') || '';
  if (TOKEN) {
    loadUsers().catch(() => { TOKEN = ''; localStorage.removeItem('tfAdminToken'); });
  }
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  ['loginEmail','loginPwd'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });
  document.getElementById('logoutBtn').addEventListener('click', doLogout);
  document.getElementById('modalConfirm').addEventListener('click', () => { if (modalCb) modalCb(); });
  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
})();

// ── Auth ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const email = (document.getElementById('loginEmail').value || '').trim();
  const pwd   = (document.getElementById('loginPwd').value   || '').trim();
  if (!email || !pwd) { showLoginErr('Email and password required.'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  document.getElementById('loginErr').style.display = 'none';
  try {
    const res  = await apiFetch('/api/tagflow/auth/login', { email, password: pwd }, null, 'POST');
    const data = await res.json();
    if (!res.ok || !data.success) { showLoginErr(data.error || 'Login failed.'); return; }
    if (!['owner','admin'].includes(data.role || '')) {
      showLoginErr('Access denied — owner or admin role required.'); return;
    }
    TOKEN = data.token;
    localStorage.setItem('tfAdminToken', TOKEN);
    document.getElementById('adminEmail').textContent = data.email || email;
    await loadUsers();
  } catch (e) {
    showLoginErr('Connection error: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

function doLogout() {
  TOKEN = ''; localStorage.removeItem('tfAdminToken'); allUsers = [];
  document.getElementById('dashWrap').style.display  = 'none';
  document.getElementById('loginWrap').style.display = 'flex';
}

function showLoginErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg; el.style.display = 'block';
}

// ── API helper ────────────────────────────────────────────────────────────────
function apiFetch(path, body, token, method) {
  const m = method || (body ? 'POST' : 'GET');
  return fetch(API + path, {
    method: m,
    headers: {
      'content-type': 'application/json',
      ...(token || TOKEN ? { 'authorization': 'Bearer ' + (token || TOKEN) } : {})
    },
    ...(body ? { body: JSON.stringify(body) } : {})
  });
}

// ── Load users ────────────────────────────────────────────────────────────────
async function loadUsers() {
  const res = await apiFetch('/api/tagflow/admin/users');
  if (res.status === 401 || res.status === 403) {
    doLogout(); showLoginErr('Session expired or access denied. Please sign in.'); throw new Error('auth');
  }
  const data = await res.json();
  allUsers   = data.users || [];
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('dashWrap').style.display  = 'block';
  renderStats(); renderTable();
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats() {
  const t   = allUsers.length;
  const fr  = allUsers.filter(u => u.plan === 'free').length;
  const pd  = allUsers.filter(u => u.plan !== 'free').length;
  const ac  = allUsers.filter(u => (u.account_status || 'active') === 'active').length;
  const ut  = allUsers.reduce((s, u) => s + (u.used_today || 0), 0);
  document.getElementById('statsBar').innerHTML =
    stat(t,'Total users') + stat(fr,'Free') + stat(pd,'Paid') + stat(ac,'Active') + stat(ut,'Analyses today');
}
function stat(v, l) { return `<div class="stat"><div class="stat-val">${v}</div><div class="stat-lbl">${l}</div></div>`; }

// ── Table ─────────────────────────────────────────────────────────────────────
function renderTable() {
  const q   = (document.getElementById('searchInput').value || '').toLowerCase();
  const rows = allUsers.filter(u => !q || u.email.toLowerCase().includes(q));
  const tb  = document.getElementById('usersBody');
  if (!rows.length) { tb.innerHTML = '<tr><td colspan="9" class="no-data">No users found.</td></tr>'; return; }
  tb.innerHTML = rows.map(u => {
    const eff  = u.effective_daily_limit === -1 ? '&infin;' : (u.effective_daily_limit ?? '&mdash;');
    const ovr  = u.daily_limit_override  != null ? u.daily_limit_override : '&mdash;';
    const dt   = u.created_at ? new Date(u.created_at).toLocaleDateString('en-GB') : '&mdash;';
    const st   = u.account_status || 'active';
    const id   = esc(u.id);
    return `<tr>
      <td><strong>${esc(u.email)}</strong>${u.admin_note?'<br><span class="inf">'+esc(u.admin_note)+'</span>':''}</td>
      <td><span class="badge badge-${esc(u.plan)}">${esc(u.plan.toUpperCase())}</span></td>
      <td><span class="badge badge-${esc(u.role||'user')}">${esc((u.role||'user').toUpperCase())}</span></td>
      <td>${u.used_today||0}</td>
      <td>${eff}</td>
      <td>${ovr}</td>
      <td><span class="badge badge-${esc(st)}">${esc(st)}</span></td>
      <td class="inf">${dt}</td>
      <td><div class="actions">
        <button class="act-btn act-free" onclick="setPlan('${id}','free')">Free</button>
        <button class="act-btn act-prem" onclick="setPlan('${id}','premium')">Premium</button>
        <button class="act-btn act-powr" onclick="setPlan('${id}','power')">Power</button>
        <button class="act-btn act-add"  onclick="addCredit('${id}',50)">+50</button>
        <button class="act-btn act-add"  onclick="addCredit('${id}',100)">+100</button>
        <button class="act-btn act-ovr"  onclick="promptOverride('${id}','${esc(u.email)}',${u.daily_limit_override??'null'})">Limit</button>
        <button class="act-btn act-rst"  onclick="resetUsage('${id}')">Reset</button>
        ${st==='disabled'
          ? `<button class="act-btn act-enb" onclick="toggleAccount('${id}','active')">Enable</button>`
          : `<button class="act-btn act-dis" onclick="toggleAccount('${id}','disabled')">Disable</button>`}
      </div></td>
    </tr>`;
  }).join('');
}

function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Row actions ───────────────────────────────────────────────────────────────
async function setPlan(id, plan)          { await doPatch(id, { plan }); }
async function toggleAccount(id, status)  { await doPatch(id, { account_status: status }); }

async function addCredit(id, amount) {
  try {
    const res  = await apiFetch(`/api/tagflow/admin/users/${id}/add-credit`, { amount }, TOKEN, 'POST');
    const data = await res.json();
    if (!res.ok || !data.success) { toast(data.error || 'Error', 'err'); return; }
    toast(`+${amount} credits added (new limit: ${data.effective_daily_limit})`, 'ok');
    await loadUsers();
  } catch (e) { toast('Error: ' + e.message, 'err'); }
}

async function resetUsage(id) {
  try {
    const res  = await apiFetch(`/api/tagflow/admin/users/${id}/reset-usage`, {}, TOKEN, 'POST');
    const data = await res.json();
    if (!res.ok || !data.success) { toast(data.error || 'Error', 'err'); return; }
    toast('Usage reset to 0', 'ok');
    await loadUsers();
  } catch (e) { toast('Error: ' + e.message, 'err'); }
}

function promptOverride(id, email, current) {
  document.getElementById('modalTitle').textContent = 'Set Limit Override — ' + email;
  document.getElementById('modalInput').value = current !== null ? current : '';
  document.getElementById('modal').classList.add('open');
  modalCb = async () => {
    const val = document.getElementById('modalInput').value.trim();
    const num = val === '' ? null : parseInt(val, 10);
    if (val !== '' && (isNaN(num) || num < 0)) { toast('Enter a non-negative integer or leave blank to clear.', 'err'); return; }
    closeModal();
    await doPatch(id, { daily_limit_override: num });
  };
}

function closeModal() { document.getElementById('modal').classList.remove('open'); modalCb = null; }

async function doPatch(id, body) {
  try {
    const res  = await apiFetch(`/api/tagflow/admin/users/${id}`, body, TOKEN, 'PATCH');
    const data = await res.json();
    if (!res.ok || !data.success) { toast(data.error || 'Error', 'err'); return; }
    toast('Updated', 'ok');
    await loadUsers();
  } catch (e) { toast('Error: ' + e.message, 'err'); }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let _tt = null;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = type || 'ok'; el.style.display = 'block';
  clearTimeout(_tt);
  _tt = setTimeout(() => { el.style.display = 'none'; }, 3500);
}
</script>
</body>
</html>
