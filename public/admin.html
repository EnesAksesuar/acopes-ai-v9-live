<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TagFlow Admin</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090b10;
        --panel: rgba(255, 255, 255, 0.07);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f7f1e8;
        --muted: #a9a39b;
        --green: #1D9E75;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh;
        background: radial-gradient(circle at top left, rgba(29, 158, 117, 0.15), transparent 34rem), var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { width: min(1100px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0; }
      h1 { margin: 0 0 6px; font-size: 28px; }
      .sub { color: var(--muted); margin: 0 0 28px; font-size: 13px; }
      .sub a { color: var(--green); }
      /* Login form */
      #loginSection { max-width: 360px; }
      .field { margin-bottom: 12px; }
      .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; }
      .field input {
        width: 100%; height: 42px; border-radius: 10px;
        border: 1px solid var(--line); background: rgba(255,255,255,0.08);
        color: var(--text); padding: 0 14px; font: inherit;
      }
      .btn-login {
        width: 100%; height: 42px; border-radius: 10px; border: none;
        background: var(--green); color: #fff; font: 600 14px inherit; cursor: pointer;
        transition: background .15s;
      }
      .btn-login:hover:not(:disabled) { background: #0F6E56; }
      .btn-login:disabled { background: #4b5563; cursor: not-allowed; }
      /* Stats row */
      .stats { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
      .stat {
        background: var(--panel); border: 1px solid var(--line);
        border-radius: 10px; padding: 14px 20px; min-width: 120px;
      }
      .stat small { display: block; color: var(--muted); font-size: 11px; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
      .stat strong { font-size: 26px; }
      /* Table */
      .tbl-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--line); }
      table { width: 100%; border-collapse: collapse; background: var(--panel); }
      th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; vertical-align: middle; }
      th { color: var(--green); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
      tr:last-child td { border-bottom: none; }
      .badge {
        display: inline-block; padding: 2px 8px; border-radius: 20px;
        font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em;
      }
      .badge.free    { background: #374151; color: #9ca3af; }
      .badge.premium { background: #451a03; color: #fbbf24; }
      .badge.power   { background: #2e1065; color: #c4b5fd; }
      /* Status lines */
      .status { margin: 14px 0; font-size: 13px; min-height: 20px; color: var(--muted); }
      .status.err { color: #f87171; }
    </style>
  </head>
  <body>
    <main>
      <h1>🏷️ TagFlow Admin</h1>
      <p class="sub">Owner dashboard &middot; <a href="https://acopesai.com">acopesai.com</a></p>

      <!-- ── Login form (shown when no valid token) ── -->
      <div id="loginSection">
        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="ornek@email.com" autocomplete="email" />
        </div>
        <div class="field">
          <label>Şifre</label>
          <input type="password" id="loginPass" placeholder="Şifreniz" autocomplete="current-password" />
        </div>
        <button class="btn-login" id="loginBtn">Giriş Yap</button>
        <div class="status" id="loginStatus"></div>
      </div>

      <!-- ── Dashboard (shown after successful auth) ── -->
      <div id="dashSection" style="display:none">
        <div class="stats">
          <div class="stat"><small>Toplam Kullanıcı</small><strong id="statTotal">--</strong></div>
          <div class="stat"><small>Free</small><strong id="statFree">--</strong></div>
          <div class="stat"><small>Premium</small><strong id="statPremium">--</strong></div>
          <div class="stat"><small>Power Seller</small><strong id="statPower">--</strong></div>
        </div>
        <div class="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th>Email</th>
                <th>Plan</th>
                <th>Bugün Kullanım</th>
                <th>Abonelik Durumu</th>
                <th>Yenileme Tarihi</th>
                <th>Kayıt Tarihi</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="6">Yükleniyor...</td></tr>
            </tbody>
          </table>
        </div>
        <div class="status" id="dashStatus"></div>
      </div>
    </main>

    <script>
      'use strict';
      const API = 'https://acopes-ai-production.up.railway.app/api/tagflow';

      const loginSection = document.getElementById('loginSection');
      const dashSection  = document.getElementById('dashSection');
      const loginStatus  = document.getElementById('loginStatus');
      const dashStatus   = document.getElementById('dashStatus');
      const loginBtn     = document.getElementById('loginBtn');
      const usersBody    = document.getElementById('usersBody');

      function esc(v) {
        return String(v == null ? '' : v).replace(/[&<>"']/g, c =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[c]));
      }

      function planBadge(plan) {
        const p = (plan || 'free').toLowerCase();
        return '<span class="badge ' + esc(p) + '">' + esc(p) + '</span>';
      }

      function fmtDate(iso) {
        if (!iso) return '--';
        try { return new Date(iso).toLocaleDateString('tr-TR'); } catch { return String(iso); }
      }

      function showDash(users) {
        loginSection.style.display = 'none';
        dashSection.style.display  = 'block';

        document.getElementById('statTotal').textContent   = users.length;
        document.getElementById('statFree').textContent    = users.filter(u => (u.plan || 'free') === 'free').length;
        document.getElementById('statPremium').textContent = users.filter(u => u.plan === 'premium').length;
        document.getElementById('statPower').textContent   = users.filter(u => u.plan === 'power').length;

        if (!users.length) {
          usersBody.innerHTML = '<tr><td colspan="6">Henüz kayıtlı kullanıcı yok.</td></tr>';
        } else {
          usersBody.innerHTML = users.map(u =>
            '<tr>' +
            '<td>' + esc(u.email) + '</td>' +
            '<td>' + planBadge(u.plan) + '</td>' +
            '<td>' + esc(u.used_today != null ? u.used_today : 0) + '</td>' +
            '<td>' + esc(u.subscription_status || 'active') + '</td>' +
            '<td>' + fmtDate(u.subscription_renewal) + '</td>' +
            '<td>' + fmtDate(u.created_at) + '</td>' +
            '</tr>'
          ).join('');
        }

        dashStatus.textContent = users.length + ' kullanıcı yüklendi · ' + new Date().toLocaleTimeString('tr-TR');
      }

      async function loadUsers(token) {
        const res  = await fetch(API + '/admin/users', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        const data = await res.json().catch(() => ({}));
        return { ok: res.ok, status: res.status, data };
      }

      // ── Auto-auth from ?token= URL param ─────────────────────────────────────
      (async function init() {
        const urlToken = new URLSearchParams(location.search).get('token');
        if (!urlToken) return; // no token → show login form
        loginStatus.textContent = 'Oturum doğrulanıyor...';
        loginStatus.className = 'status';
        try {
          const { ok, status, data } = await loadUsers(urlToken);
          if (ok && data.success) {
            showDash(data.users || []);
            return;
          }
          // Invalid or unauthorised — strip token from URL, show login
          history.replaceState({}, '', location.pathname);
          if (status === 403) {
            loginStatus.textContent = 'Bu hesabın admin yetkisi yok.';
          } else {
            loginStatus.textContent = 'Oturum süresi dolmuş. Lütfen tekrar giriş yapın.';
          }
          loginStatus.className = 'status err';
        } catch (e) {
          history.replaceState({}, '', location.pathname);
          loginStatus.textContent = 'Bağlantı hatası: ' + e.message;
          loginStatus.className = 'status err';
        }
      })();

      // ── Fallback email / password login ──────────────────────────────────────
      async function doLogin() {
        const email    = (document.getElementById('loginEmail').value || '').trim();
        const password = (document.getElementById('loginPass').value  || '').trim();
        if (!email || !password) {
          loginStatus.textContent = 'Email ve şifre gerekli.';
          loginStatus.className = 'status err';
          return;
        }

        loginBtn.disabled    = true;
        loginBtn.textContent = 'Bekleniyor...';
        loginStatus.textContent = '';
        loginStatus.className = 'status';

        try {
          const loginRes  = await fetch(API + '/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const loginData = await loginRes.json().catch(() => ({}));

          if (!loginRes.ok || !loginData.success) {
            loginStatus.textContent = loginData.error || 'Giriş başarısız.';
            loginStatus.className = 'status err';
            loginBtn.disabled = false;
            loginBtn.textContent = 'Giriş Yap';
            return;
          }

          const { ok, status, data } = await loadUsers(loginData.token);
          if (ok && data.success) {
            showDash(data.users || []);
          } else {
            loginStatus.textContent = status === 403
              ? 'Bu hesabın admin yetkisi yok.'
              : (data.error || 'Admin erişimi başarısız.');
            loginStatus.className = 'status err';
            loginBtn.disabled = false;
            loginBtn.textContent = 'Giriş Yap';
          }
        } catch (e) {
          loginStatus.textContent = 'Bağlantı hatası: ' + e.message;
          loginStatus.className = 'status err';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Giriş Yap';
        }
      }

      loginBtn.addEventListener('click', doLogin);
      ['loginEmail', 'loginPass'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
      });
    </script>
  </body>
</html>
