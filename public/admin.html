<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ACOPES AI Admin</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090b10;
        --panel: rgba(255, 255, 255, 0.07);
        --line: rgba(255, 255, 255, 0.12);
        --text: #f7f1e8;
        --muted: #a9a39b;
        --gold: #d9b878;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: radial-gradient(circle at top left, rgba(217, 184, 120, 0.18), transparent 34rem), var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 40px 0; }
      header { display: flex; justify-content: space-between; gap: 20px; align-items: end; margin-bottom: 28px; }
      h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 48px); letter-spacing: 0; }
      p { margin: 0; color: var(--muted); }
      .auth, .card, table {
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
        backdrop-filter: blur(18px);
        border-radius: 14px;
      }
      .auth { display: flex; gap: 10px; padding: 12px; }
      input, button {
        height: 42px;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
        padding: 0 14px;
        font: inherit;
      }
      button { cursor: pointer; background: var(--gold); color: #17120a; font-weight: 700; }
      .grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 18px; }
      .card { padding: 18px; }
      .card small { color: var(--muted); display: block; margin-bottom: 8px; }
      .card strong { font-size: 30px; }
      table { width: 100%; border-collapse: collapse; overflow: hidden; }
      th, td { padding: 14px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
      th { color: var(--gold); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }
      td { color: #eee7dc; }
      .status { margin: 14px 0; color: var(--muted); min-height: 22px; }
      @media (max-width: 820px) {
        header, .auth { display: block; }
        .auth input, .auth button { width: 100%; margin-top: 10px; }
        .grid { grid-template-columns: 1fr 1fr; }
        table { display: block; overflow-x: auto; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>ACOPES AI Admin</h1>
          <p>Private production stats for beta operations.</p>
        </div>
        <form class="auth" id="adminForm">
          <input id="adminSecret" type="password" placeholder="ADMIN_SECRET" autocomplete="off" />
          <button type="submit">Load Stats</button>
        </form>
      </header>
      <div class="status" id="status">Enter the admin secret to load stats.</div>
      <section class="grid">
        <article class="card"><small>Total users</small><strong id="totalUsers">--</strong></article>
        <article class="card"><small>Optimizations today</small><strong id="today">--</strong></article>
        <article class="card"><small>This week</small><strong id="week">--</strong></article>
        <article class="card"><small>All time</small><strong id="allTime">--</strong></article>
      </section>
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Shop</th>
            <th>Shop URL</th>
            <th>Credits used</th>
            <th>Optimizations</th>
            <th>Last active</th>
            <th>Etsy</th>
          </tr>
        </thead>
        <tbody id="usersBody">
          <tr><td colspan="7">No data loaded.</td></tr>
        </tbody>
      </table>
    </main>
    <script>
      const form = document.querySelector("#adminForm");
      const statusEl = document.querySelector("#status");
      const usersBody = document.querySelector("#usersBody");
      const escapeHtml = (value = "") => String(value).replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const secret = document.querySelector("#adminSecret").value.trim();
        if (!secret) {
          statusEl.textContent = "Enter ADMIN_SECRET first.";
          return;
        }
        statusEl.textContent = "Loading admin stats...";
        const response = await fetch("/api/admin/stats", { headers: { "x-admin-secret": secret } });
        const result = await response.json().catch(() => ({}));
        if (!response.ok || result.success === false) {
          statusEl.textContent = result.message || result.error || "Admin request failed.";
          return;
        }
        const data = result.data || result;
        document.querySelector("#totalUsers").textContent = data.total_registered_users ?? 0;
        document.querySelector("#today").textContent = data.optimizations?.today ?? 0;
        document.querySelector("#week").textContent = data.optimizations?.this_week ?? 0;
        document.querySelector("#allTime").textContent = data.optimizations?.all_time ?? 0;
        usersBody.innerHTML = (data.users || []).length
          ? data.users.map((user) => `
              <tr>
                <td>${escapeHtml(user.email)}</td>
                <td>${escapeHtml(user.shop_name || "--")}</td>
                <td>${escapeHtml(user.shop_url || "--")}</td>
                <td>${escapeHtml(user.credits_used ?? 0)}</td>
                <td>${escapeHtml(user.optimizations_count ?? 0)}</td>
                <td>${escapeHtml(user.last_active || "--")}</td>
                <td>${escapeHtml(user.etsy_connected || "no")}</td>
              </tr>
            `).join("")
          : `<tr><td colspan="7">No users found.</td></tr>`;
        statusEl.textContent = `Loaded at ${new Date(data.generated_at || Date.now()).toLocaleString()}`;
      });
    </script>
  </body>
</html>
